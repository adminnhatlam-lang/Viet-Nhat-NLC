<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VinFleet — Nhận Xe</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8192C; --bg: #f3f4f9; --border: #e4e7f2; --text: #1a1d2e;
  --radius: 16px; --shadow: 0 4px 12px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }

/* HEADER & HERO */
header { background: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
.logo em { color: var(--red); font-style: normal; }
.hero { background: var(--red); color: #fff; padding: 20px; }
.hero h2 { font-family: 'Syne', sans-serif; font-size: 20px; }

/* PROGRESS */
.prog-wrap { background: #fff; padding: 15px; display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
.step { flex: 1; text-align: center; min-width: 60px; opacity: 0.4; transition: 0.3s; }
.step.active { opacity: 1; font-weight: 800; color: var(--red); }
.dot { width: 24px; height: 24px; background: #eee; border-radius: 50%; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.step.active .dot { background: var(--red); color: #fff; }

/* SECTIONS */
.container { padding: 15px; }
.section { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
.sec-head { padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 700; }
.sec-num { width: 28px; height: 28px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.section.open { border-color: var(--red); }
.section.open .sec-num { background: var(--red); color: #fff; }
.sec-body { padding: 0 16px 16px; display: none; }
.section.open .sec-body { display: block; }

/* PHOTO GRID - FIX LỖI ẨN INPUT */
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.p-slot { aspect-ratio: 1; background: #f8f9fc; border: 2px dashed #ccd0e0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; overflow: hidden; position: relative; }
.p-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
input[type="file"] { display: none !important; } /* ẨN HOÀN TOÀN NÚT CHỌN TỆP XẤU */

/* FORM ELEMENTS */
input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 15px; margin-top: 8px; background: #fcfdfe; outline: none; }
input:focus { border-color: var(--red); background: #fff; }

/* BUTTONS */
.btn-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: #fff; border-top: 1px solid var(--border); z-index: 100; }
.sub-btn { width: 100%; max-width: 500px; margin: 0 auto; background: var(--red); color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; display: block; }
.sub-btn:disabled { opacity: 0.5; }

#success { display: none; text-align: center; padding: 50px 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">Vin<em>Fleet</em></div>
  <div id="dateChip" style="font-size: 12px; font-weight: 700;"></div>
</header>

      </select>
    </div>
  </div>
